[pytest]
DJANGO_SETTINGS_MODULE = school.settings.development
python_files = tests.py test_*.py *_tests.py
# --strict-markers: reject unregistered pytest.mark.* (catches typos)
# --reuse-db: reuse test DB between runs for speed (auto-recreated on schema change)
# -ra: print short summary of all test outcomes
addopts = --strict-markers --reuse-db -ra
testpaths = .
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks integration tests (requires DB + Redis)
