[flake8]
max-line-length = 100
exclude = venv,migrations,__pycache__,.git
ignore = E203,W503

[isort]
profile = black
line_length = 100
skip = venv,migrations

[tool:black]
line-length = 100
exclude = venv|migrations

[coverage:run]
source = .
omit =
    */migrations/*
    */tests/*
    */venv/*
    manage.py
    create_admin.py
    reset_admin.py
    school/settings/*
    school/wsgi.py
    school/asgi.py

[coverage:report]
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if __name__ == .__main__.:
show_missing = True
precision = 2
